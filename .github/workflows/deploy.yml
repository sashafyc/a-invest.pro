name: Deploy to Timeweb
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.FTP_SERVER }} >> ~/.ssh/known_hosts 2>/dev/null || true
      - name: Deploy via SFTP
        run: |
          lftp -e "
            set sftp:connect-program 'ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519';
            open sftp://${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }};
            mirror --reverse --delete --verbose \
              --exclude ^\.git/ \
              --exclude ^_materials/ \
              --exclude ^_distributions/ \
              --exclude ^_template\.html$ \
              --exclude ^README\.md$ \
              --exclude ^\.gitignore$ \
              . /a-invest/public_html/;
            quit
          "
