name: Deploy to Timeweb
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" > ~/.ssh/config
      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='_materials/' \
            --exclude='_distributions/' \
            --exclude='_template.html' \
            --exclude='README.md' \
            --exclude='.gitignore' \
            --exclude='deploy.sh' \
            -e "ssh -i ~/.ssh/id_ed25519 -o ConnectTimeout=30" \
            ./ ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:/home/c/${{ secrets.FTP_USERNAME }}/a-invest/public_html/
